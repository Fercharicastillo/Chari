<script defer type="text/javascript">
                document.addEventListener("DOMContentLoaded", function() {
                    var pdfSrc = sessionStorage.getItem('pdfSrc');
                    if (pdfSrc) {
                    document.getElementById('pdfViewer').src = pdfSrc;
                    }
                });
                function setPdfSrcAndRedirect(pdfSrc) {
                    sessionStorage.setItem('pdfSrc', pdfSrc);
                    window.location.href = "templatepdfs_formulas.html";
                }

                document.addEventListener("DOMContentLoaded", function() {
                var gotoTopBtns = document.querySelectorAll('.goto-top-btn');
                gotoTopBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var pdfSrc = this.getAttribute('data-pdf');
                    if (pdfSrc) {
                    setPdfSrcAndRedirect(pdfSrc);
            }
        });
    });
});
